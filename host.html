<!doctype html><html lang="fr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="theme-color" content="#070817"><title>Le Grand Quiz — Console soignant</title><link rel="stylesheet" href="styles.css?v=1"></head>
<body><div class="shell"><div class="brand"><div class="brand-logo">🎛️</div><div><h1>Console du Grand Quiz</h1><p>Prépare la partie, lance les questions et pilote le jeu.</p></div></div>
<div class="host-layout"><section class="stack"><div class="panel pad"><div class="grid two"><div class="field"><label for="roomInput">Code de salle</label><input id="roomInput" maxlength="16" value="QUIZ01"></div><div class="field"><label>Connexion</label><div><span id="connection" class="badge warn">Connexion…</span></div></div></div></div>
<div class="panel pad"><h2 style="margin-top:0">Réglages</h2><div class="grid two"><div class="field"><label for="modeSelect">Mode</label><select id="modeSelect"><option value="individual">Individuel</option><option value="teams">Équipes</option></select></div><div class="field"><label for="countSelect">Nombre de questions</label><select id="countSelect"><option>10</option><option selected>15</option><option>20</option><option>25</option></select></div><div class="field"><label for="durationSelect">Temps par question</label><select id="durationSelect"><option value="15000">15 secondes</option><option value="20000" selected>20 secondes</option><option value="30000">30 secondes</option></select></div><div class="field"><label for="speedSelect">Bonus rapidité</label><select id="speedSelect"><option value="on" selected>Activé</option><option value="off">Désactivé</option></select></div></div><div style="margin-top:14px"><strong>Catégories</strong><div id="categories" class="category-grid"></div></div><div class="actions" style="margin-top:16px"><button id="startBtn" class="btn green big">🚀 Lancer la partie</button><button id="resetBtn" class="btn danger">Réinitialiser</button></div></div>
<div class="panel pad"><div class="actions"><a id="screenLink" class="btn" target="_blank">📺 Ouvrir l’écran TV</a><a id="playerLink" class="btn" target="_blank">📱 Ouvrir une interface joueur</a></div></div></section>
<section class="stack"><div class="panel pad"><div class="host-status"><div class="metric"><small>Joueurs</small><strong id="metricPlayers">0</strong></div><div class="metric"><small>Réponses</small><strong id="metricAnswers">0</strong></div><div class="metric"><small>Question</small><strong id="metricQuestion">—</strong></div></div></div><div class="panel pad"><div id="hostStage"><div class="muted">La partie est en attente. Les joueurs peuvent déjà rejoindre la salle.</div></div></div><div class="panel pad"><h3 style="margin-top:0">Joueurs</h3><div id="playersPanel" class="player-list"></div></div></section></div></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="config.js"></script><script src="shared.js"></script><script src="questions.js"></script><script src="host.js?v=1"></script></body></html>
